name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: [self-hosted, scntnms-ephemeral]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install dependencies (hash-verified from uv.lock)
        run: uv sync --locked --group build

      - name: Lint
        run: uv run inv lint

      - name: Security
        run: uv run inv security

      - name: Test
        run: uv run inv test
