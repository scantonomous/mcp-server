[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scantonomous-mcp"
version = "0.1.0"
description = "Scantonomous MCP server for AI agent integration"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27",
    "keyring>=25.0",
    "click>=8.0",
]

[project.optional-dependencies]
dev = [
    "invoke>=2.2.0",
    "ruff>=0.8.0",
    "pyright>=1.1.390",
    "bandit>=1.7.0",
    "pip-audit>=2.7.0",
    "detect-secrets>=1.5.0",
    "build>=1.0.0",
]

[project.scripts]
scantonomous-mcp = "scantonomous_mcp.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/scantonomous_mcp"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "BLE", "S", "SLF", "T20", "PLC", "PLE", "PLW"]
ignore = ["S603", "S607", "E501", "PLC0415"]

[tool.ruff.lint.per-file-ignores]
"tasks.py" = ["ARG001", "S605", "T201"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
