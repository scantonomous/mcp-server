[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "scantonomous-mcp"
version = "0.1.0"
description = "Scantonomous MCP server for AI agent integration"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "mcp>=1.0.0",
    "httpx>=0.27",
    "keyring>=25.0",
    "click>=8.0",
]

[project.scripts]
scantonomous-mcp = "scantonomous_mcp.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/scantonomous_mcp"]
